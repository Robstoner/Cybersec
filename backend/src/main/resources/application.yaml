spring:
  application:
    name: workout-tracker

  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true

server:
  port: 8080

# JWT config
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000 # 24 hours
  cors:
    # Override with CORS_ALLOWED_ORIGINS env var in production (comma-separated URLs)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  storage:
    # Path (relative to CWD) where uploaded post images are stored. Override with UPLOAD_DIR.
    upload-dir: ${UPLOAD_DIR:./uploads}
  admin:
    # Optional bootstrap admin. If all three are set, DataInitializer creates the user
    # on first startup (or skips if the username already exists).
    username: ${ADMIN_USERNAME:}
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
