spring:
  application:
    name: workout-tracker

  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true

server:
  port: 8080

# JWT config
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000 # 24 hours
  cors:
    # Override with CORS_ALLOWED_ORIGINS env var in production (comma-separated URLs)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
